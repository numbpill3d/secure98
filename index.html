<!DOCTYPE html>
<html>
<head>
    <title>SecuritySoft 98</title>
    <style>
        body {
            font-family: 'MS Sans Serif', Arial, sans-serif;
            background: #c0c0c0;
            margin: 0;
            padding: 20px;
        }
        
        .window {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border: 2px solid #000;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }

        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            padding: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .title-bar-text {
            font-weight: bold;
            font-size: 12px;
        }

        .window-buttons {
            display: flex;
            gap: 2px;
        }

        .window-button {
            background: #c0c0c0;
            border: 1px solid #000;
            padding: 0 6px;
            font-size: 10px;
            line-height: 14px;
            cursor: pointer;
        }

        .content {
            padding: 16px;
            background: #f0f0f0;
        }

        .status-box {
            border: 1px solid #808080;
            padding: 8px;
            margin-bottom: 16px;
            background: white;
            font-size: 12px;
            font-family: monospace;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .action-button {
            border: 2px solid #808080;
            background: #c0c0c0;
            padding: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .action-button:hover {
            background: #d0d0d0;
        }

        .action-button:active {
            background: #a0a0a0;
        }

        .log-box {
            border: 1px solid #808080;
            padding: 8px;
            background: white;
            font-size: 12px;
            font-family: monospace;
        }

        .warning {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                <span>🛡️ SecuritySoft 98</span>
            </div>
            <div class="window-buttons">
                <button class="window-button">_</button>
                <button class="window-button">□</button>
                <button class="window-button">X</button>
            </div>
        </div>
        
        <div class="content">
            <div class="status-box">
                System Status: SCANNING...
                <br>
                Protection Level: 100%
                <br>
                Corruption: 0%
            </div>

            <div class="button-grid">
                <button class="action-button">SCAN SYSTEM</button>
                <button class="action-button">DEFRAGMENT</button>
            </div>

            <div class="log-box">
                <div>Vulnerability Log:</div>
                <div class="warning">!WARNING! BUFFER_OVERFLOW at 0xDEADBEEF</div>
                <div class="warning">!WARNING! NULL_POINTER at 0xC0FFEE</div>
            </div>
        </div>
    </div>

    <script>
        // Basic functionality demonstration
        document.querySelectorAll('.action-button').forEach(button => {
            button.addEventListener('click', () => {
                if (button.textContent === 'SCAN SYSTEM') {
                    button.textContent = 'SCANNING...';
                    setTimeout(() => {
                        button.textContent = 'SCAN SYSTEM';
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
